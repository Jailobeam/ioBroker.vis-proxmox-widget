<!--

<link rel="stylesheet" href="widgets/proxmox-widget/css/style.css" />
<script type="text/javascript" src="widgets/proxmox-widget/js/proxmox.js"></script>

<script id="tplProxmoxOverview"
        type="text/ejs"
        class="vis-tpl"
        data-vis-prev='<div id="prev_tplProxmoxOverview" style="position: relative; text-align: initial; padding: 2px"><div class="vis-widget_prev proxmox-widget" style="width: 122px; height: 186px; overflow: hidden; border-radius: 16px;"><div class="proxmox-widget__header" style="padding: 10px 10px 6px;"><span class="proxmox-widget__title" style="font-size: 11px;">Proxmox</span><span class="proxmox-widget__summary" style="display:none;">VM 1/1</span></div><div class="proxmox-widget__body" style="grid-template-columns: 1fr; gap: 8px; padding: 0 8px 8px;"><div class="proxmox-card proxmox-card--running" style="padding: 10px 10px 12px; min-height: 0;"><div class="proxmox-card__top" style="align-items: flex-start;"><div class="proxmox-card__name" style="font-size: 10px; line-height: 1.2;">vm101 web</div><div class="proxmox-card__status" style="font-size: 8px; padding: 2px 6px;">RUN</div></div><div class="proxmox-card__meta" style="font-size: 8px; margin-top: 6px;">VM | 101</div><div class="proxmox-card__metrics" style="gap: 4px; margin-top: 8px;"><span class="proxmox-chip" style="font-size: 8px; padding: 3px 6px;">CPU 24%</span><span class="proxmox-chip" style="font-size: 8px; padding: 3px 6px;">DSK 41%</span></div></div></div></div></div>'
        data-vis-attrs="proxmoxInstance[]/custom,proxmox.instanceSelector;title[Proxmox Cluster]/text;scale[100]/slider,60,160,5;cardsPerRow[2]/slider,1,6,1;showNodes[false]/checkbox;showVms[true]/checkbox;showContainers[true]/checkbox;showStorage[false]/checkbox;showCpu[true]/checkbox;showRam[true]/checkbox;showDisk[true]/checkbox;memoryDisplay[percent]/select,percent,values,both;diskDisplay[percent]/select,percent,values,both;sortBy[name]/select,name,vmid,status,cpu,memory,disk;showSummary[true]/checkbox;showUptime[false]/checkbox;widgetBackgroundMode[gradient]/select,color,gradient,transparent;widgetColor1[#091220]/color;widgetColor2[#0f1c30]/color;widgetGradientDirection[180deg]/select,180deg,90deg,135deg;widgetOpacity[6]/slider,0,100,1;widgetRadius[14]/slider,0,40,1;cardBackgroundMode[gradient]/select,color,gradient,transparent;cardColor1[#2a3648]/color;cardColor2[#243248]/color;cardGradientDirection[180deg]/select,180deg,90deg,135deg;cardOpacity[0]/slider,0,100,1;cardRadius[12]/slider,0,40,1;cardPadding[10]/slider,4,24,1;cardShadow[0]/slider,0,100,1;cardBorderColor[rgba(255,255,255,0.08)]/color;chipBackgroundColor[rgba(24,124,205,0.16)]/color;chipBorderColor[rgba(255,255,255,0.00)]/color;chipTextColor[#d8e7ff]/color;chipFontSize[10]/slider,8,24,1;titleColor[#eef4ff]/color;titleFontSize[16]/slider,10,32,1;nameColor[#eef4ff]/color;nameFontSize[13]/slider,10,28,1;metaColor[#9db2cf]/color;metaFontSize[11]/slider,8,22,1;summaryColor[#c8d7ef]/color;summaryFontSize[13]/slider,10,24,1;detailColor[#9db2cf]/color;detailFontSize[11]/slider,8,22,1;messageColor[#9db2cf]/color;messageFontSize[12]/slider,8,24,1;statusRunBg[rgba(55,214,122,0.16)]/color;statusRunText[#dff3ff]/color;statusFontSize[10]/slider,8,20,1;statusWarnBg[rgba(255,159,26,0.28)]/color;statusWarnText[#fff1cf]/color;statusOffBg[rgba(255,95,87,0.28)]/color;statusOffText[#ffe2df]/color;warnCpu[85]/slider,0,100,1;warnMemory[90]/slider,0,100,1;warnDisk[90]/slider,0,100,1"
        data-vis-set="proxmox-widget"
        data-vis-name="Proxmox Overview">
    <div class="vis-widget proxmox-widget <%== this.data.attr('class') %>" style="overflow: auto; width: 420px; height: 220px;" id="<%= this.data.attr('wid') %>">
        <% vis.binds.proxmox.createWidget(this.data.wid, this.view, this.data, this.style); %>
        <div class="proxmox-widget__header">
            <span class="proxmox-widget__title"></span>
            <span class="proxmox-widget__summary"></span>
        </div>
        <div class="proxmox-widget__body"></div>
    </div>
</script>
